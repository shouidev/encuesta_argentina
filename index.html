
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Encuesta identidad argentina</title>

<script src="https://unpkg.com/jspsych@7.3.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-likert@1.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@1.1.0"></script>

<link href="https://unpkg.com/jspsych@7.3.0/css/jspsych.css" rel="stylesheet"/>

<style>

/* Fondo general */
body{
background-image: url("https://www.casarosada.gob.ar/images/202408/sanmartin1.jpg");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
background-attachment: fixed;
}

/* Contenedor */
.jspsych-content{
max-width:900px;
width:95%;
background:rgba(255,255,255,0.95);;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* Likert */
.jspsych-survey-likert-statement{
font-size:22px;
margin-bottom:20px;
}

.jspsych-survey-likert-table{
width:100%;
table-layout:fixed;
}

#jspsych-survey-likert-next {
display: none;
}

/* Mobile */
@media (max-width: 768px){

.jspsych-content{
width:95%;
padding:15px;
}

.jspsych-survey-likert-statement{
font-size:18px;
}

.jspsych-btn{
font-size:16px;
padding:10px;
}

}

</style>

</head>

<body></body>

<script>

// BLOQUEAR SI YA RESPONDIÓ
if(localStorage.getItem("encuesta_completada")){
document.body.innerHTML = `
<h2>Esta encuesta ya fue completada desde este dispositivo.</h2>
<p>Muchas gracias por tu participación.</p>
`;
throw new Error("Encuesta ya completada");
}

// GUARDAR DATOS
async function guardarDatos(data){

document.body.innerHTML = "<p>Guardando tus respuestas...</p>";

try {

await fetch("https://script.google.com/macros/s/AKfycbwfbCyYuj0jxCbB6KhX8PDxE8_Skihu4uOYjBsqPnxw6KAOieC4MZ-cq6uM2M31seAoZA/exec", {
method: "POST",
headers: {
"Content-Type": "application/json",
},
body: JSON.stringify(data),
});

} catch (error) {
console.error(error);
}

}

// INICIALIZAR jsPsych
const jsPsych = initJsPsych({
  show_progress_bar: true,
  auto_update_progress_bar: true
});;

// ESTEREOTIPOS
let palabras = [
"es orgulloso",
"es solidario",
"es amiguero",
"es persistente",
"es apasionado",
"es inclusivo",

"es chanta",
"es superficial",
"es agrandado",
"es competitivo",
"es negativo",
"es racista",

"es futbolero",
];

// RANDOMIZAR
palabras = jsPsych.randomization.shuffle(palabras);

// TIMELINE
let timeline = [];

// INTRO
timeline.push({
type: jsPsychHtmlButtonResponse,
stimulus: `
<div style="text-align:center">
<img src="https://media.lmneuquen.com/p/eb5d7849e3d09b15f6a7b0564d74470a/adjuntos/195/imagenes/007/396/0007396201/770x0/smart/messi-copa-del-mundo.jpeg" width="200">
<h2>Esta es la encuesta más argentina que vas a ver.</h2>
<p>Vamos a explorar tus percepciones sobre nosotros, los argentinos.</p>
<p>Obvio no hay respuestas correctas, ni incorrectas.</p>
<p>Respondé como te salga. Toda información es guardada anónimamente. </p>
</div>
`,
choices:["Comenzar"]
});

// NOTA
timeline.push({
type: jsPsychHtmlButtonResponse,
stimulus: `
<div style="text-align:center">
<h1> Eso sí, ¡cuidado! No vas a poder volver para atrás </h1>
</div>
`,
choices:["Continuar"]
});


// IDENTIDAD
timeline.push({
type: jsPsychSurveyLikert,
data:{tipo:"identidad_argentina"},
questions:[{
prompt:"<b>¿Qué tan argentino te sentís?</b>",
labels:["Nada","Poco","Algo","Bastante","Mucho"],
required:true
}],

on_load: function(){

// Selecciona todas las opciones del Likert
let radios = document.querySelectorAll('input[type="radio"]');

// A cada opción le agrega el auto-submit
radios.forEach(radio => {
radio.addEventListener("change", () => {

// pequeño delay para mejor UX
setTimeout(() => {
document.querySelector("#jspsych-survey-likert-next").click();
}, 150);

});
});

}

});

// INTRO ESTEREOTIPOS
timeline.push({
type: jsPsychHtmlButtonResponse,
stimulus: `
<p>Ahora vas a ver algunas características asociadas con los argentinos.</p>
<p><b>¿Qué tan verdaderas considerás las siguientes frases?</b></p>
`,
choices:["Continuar"]
});

// BLOQUE LIKERT
palabras.forEach(p=>{
timeline.push({

type: jsPsychSurveyLikert,

data:{estereotipo:p,tipo:"estereotipo"},

questions:[{
prompt:"<b>El argentino "+p+"</b>",
labels:["Nada","Poco","Algo","Bastante","Mucho"],
required:true
}],

on_load: function(){

// Selecciona todas las opciones del Likert
let radios = document.querySelectorAll('input[type="radio"]');

// A cada opción le agrega el auto-submit
radios.forEach(radio => {
radio.addEventListener("change", () => {

// pequeño delay para mejor UX
setTimeout(() => {
document.querySelector("#jspsych-survey-likert-next").click();
}, 150);

});
});

}

});
});

// TRANSICIÓN IDENTIDAD CULTURAL

timeline.push({

type: jsPsychHtmlButtonResponse,

stimulus:`
<p>A menudo, estos estereotipos son asociados a nuestra historia.</p>
<p>Actualmente, existe un extenso debate en redes sobre donde comienza esta historia.</p>
<p>Por lo general se mencionan dos orígenes: Europa y Latinoamérica.</p>
`,

choices:["Continuar"]

});

// IDENTIDAD CULTURAL
timeline.push({
type: jsPsychHtmlButtonResponse,
stimulus: `
<p><b>¿Con cuál de los siguientes grupos crees que la Argentina se asocia más?</b></p>
`,
choices:["Latinoamérica","Europa"],
data:{tipo:"identidad_cultural"}
});

// RESPUESTA ABIERTA
timeline.push({
type: jsPsychSurveyText,
questions:[{
prompt:"<b> ¿El argentino es algo más? (opcional) </b>",
rows:2,
columns:40
}]
});

// TRANSICIÓN DEMO
timeline.push({
type: jsPsychHtmlButtonResponse,
stimulus:`<p> <b> Ya casi terminamos, ahora algunas preguntas sobre vos. </b> </p>`,
choices:["Continuar"]
});

// EDAD
timeline.push({
type: jsPsychSurveyText,
questions:[{
prompt:"<b>Edad<b>",
required:true,
input_type:"number"
}]
});

// GÉNERO
timeline.push({
type: jsPsychSurveyMultiChoice,
questions:[
{
prompt:"<b>Género (opcional)</b>",
options:["Masculino","Femenino","No binario","Otro"]
}]
});

// PROVINCIA
timeline.push({
type: jsPsychSurveyMultiChoice,
questions:[{
prompt:"<b>¿Cuál es tu provincia de origen?</b>",
required: true,
options:["Buenos Aires","Ciudad Autónoma de Buenos Aires","Catamarca", "Chaco", "Chubut", "Córdoba","Corrientes", "Entre Ríos", "Formosa", "Jujuy", "La Pampa", "La Rioja", "Mendoza", "Misiones", "Neuquén", "Río Negro", "Salta", "San Juan", "San Luis", "Santa Cruz", "Santa Fé", "Santiago del Estero", "Tierra del Fuego, Antártida e Islas del Atlántico Sur", "Tucumán"]
}]
});

// CLUB DE FUTBOL 
timeline.push({
type: jsPsychSurveyText,
questions:[{
prompt:"<b>¿De qué equipo sos hincha? (opcional)</b>",
input_type:"text"
}]
});

// NIVEL EDUCATIVO E IDEOLOGÍA POLÍTICA
timeline.push({
type: jsPsychSurveyMultiChoice,
questions:[
    {prompt:"<b>¿A qué clase social crees que perteneces? </b>",
    required: true,
    options:["Clase Baja","Clase Media-Baja", "Clase Media", "Clase Media-Alta", "Clase Alta"]},
    
    {prompt:"<b>Con cual de estas tres posturas políticas te identificarías (opcional) </b>",
    options:["Izquierda","Centro","Derecha"]}
]
});

// INMIGRACIÓN
timeline.push({
type: jsPsychSurveyMultiChoice,
questions:[{
prompt:"<b>¿Alguno de tus abuelos o bisabuelos fue inmigrante?</b>",
options:["Sí","No", "No sé / No respondo"],
required:true,
name:"inmigrante"
}]
});

// CONDICIONAL CONTINENTE
timeline.push({
timeline:[{
type: jsPsychSurveyMultiChoice,
questions:[{
prompt:"<b>¿De qué continente provenía?</b>",
options:["África","América","Asia","Europa","Oceanía"],
required:true,
name:"continente"
}]
}],
conditional_function: function(){
let data = jsPsych.data.get().last(1).values()[0];
return data.response.inmigrante === "Sí";
}
});

timeline.push({
type: jsPsychHtmlButtonResponse,

stimulus: `
<div style="text-align:center">
<h2>¡Muchas gracias por completar la encuesta!</h2>
<p> Aguarda un segundo más...</p>
</div>
`,

choices:[],

on_load: async function(){

let datos = jsPsych.data.get().values();

await guardarDatos(datos);

localStorage.setItem("encuesta_completada","true");

// mensaje final definitivo
document.querySelector(".jspsych-content").innerHTML = `
<div style="text-align:center">
<h2> ¡Respuestas guardadas correctamente!</h2>
<p> Gracias por hacer el aguante con la encuesta ❤️ </p>
<p>🇦🇷 Otra coronación de gloria 🇦🇷</p>
<img src="https://imagenes.elpais.com/resizer/v2/JSQGSLLXSYKA24SW4ACR7CPKVE.jpg?auth=7577d6ae5e9a04654127995e674c6f1bcf6974a71d8e006a9a7cbaf3be247e1e&width=1000" width="200">
</div>
`;
}
});

// INICIAR
jsPsych.run(timeline);

</script>

</html>
