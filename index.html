<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encuesta identidad argentina</title>

<script src="https://unpkg.com/jspsych@7.3.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-likert@1.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@1.1.0"></script>

<link href="https://unpkg.com/jspsych@7.3.0/css/jspsych.css" rel="stylesheet"/>

<style>

/* Fondo general */
body{
background-image: url("https://www.casarosada.gob.ar/images/202408/sanmartin1.jpg");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
background-attachment: fixed;
}

/* Contenedor */
.jspsych-content{
max-width:900px;
width:95%;
background:rgba(255,255,255,0.95);;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* Likert */
.jspsych-survey-likert-statement{
font-size:26px;
margin-bottom:20px;
}

.jspsych-survey-likert-table{
width:100%;
table-layout:fixed;
}

#jspsych-survey-likert-next {
display: none;
}

input, textarea, select {
  font-size: 12px;
}

/* Guardado */

.loading-dots::after {
  content: "";
  animation: dots 1.5s steps(3, end) infinite;
}

@keyframes dots {
  0%   { content: ""; }
  33%  { content: "."; }
  66%  { content: ".."; }
  100% { content: "..."; }
}

/* Mobile */
@media (max-width: 768px){

.jspsych-content{
  width:80%;
  padding:16px;
  max-width: 500px;
  border-radius: 12px;
}

.jspsych-survey-likert-statement{
  font-size:18px;
  margin-bottom:10px;
}

.jspsych-survey-likert-table{
  width:100%;
  table-layout:fixed;
  font-size:12px;
}

.jspsych-survey-likert-table td{
  padding:4px 2px;
}

.jspsych-survey-likert-table input[type="radio"]{
  transform: scale(0.8);
}

.jspsych-btn{
font-size:16px;
padding:10px;
}

body{
  background-attachment: fixed;
}

}

</style>

</head>

<body></body>

<script>

// BLOQUEAR SI YA RESPONDIÓ
if(localStorage.getItem("encuesta_completada")){
document.body.innerHTML = `
<h2>Esta encuesta ya fue completada desde este dispositivo.</h2>
<p>Muchas gracias por tu participación.</p>
`;
throw new Error("Encuesta ya completada");
}

// GUARDAR DATOS
async function guardarDatos(data){

let contenedor = document.querySelector(".jspsych-content");

if(contenedor){
  contenedor.innerHTML = `
  <div style="text-align:center">
    <h2>Guardando tus respuestas<span class="loading-dots"></span></h2>
  </div>
  `;
}

try {

await fetch("https://script.google.com/macros/s/AKfycbwfIh-HAn9mO43WMIB3-9CtpfWkpv9SnPtfR7tm21TjJ59ZUoXeHcmW0EZhRzshDy0bZg/exec", {
method: "POST",
mode: "no-cors", 
headers: {
"Content-Type": "application/json",
},
body: JSON.stringify(data),
});

} catch (error) {
console.error(error);
}

}

// INICIALIZAR jsPsych
const jsPsych = initJsPsych({
  show_progress_bar: true,
  auto_update_progress_bar: true
});;

// ESTEREOTIPOS
let palabras = [
"es orgulloso",
"es solidario",
"es amiguero",
"es persistente",
"es apasionado",
"es inclusivo",

"es chanta",
"es superficial",
"es agrandado",
"es competitivo",
"es negativo",
"es racista",

"es futbolero",
];

// RANDOMIZAR
palabras = jsPsych.randomization.shuffle(palabras);

// TIMELINE
let timeline = [];

// INTRO
timeline.push({
type: jsPsychHtmlButtonResponse,
stimulus: `
<div style="text-align:center">
<img src="https://media.lmneuquen.com/p/eb5d7849e3d09b15f6a7b0564d74470a/adjuntos/195/imagenes/007/396/0007396201/770x0/smart/messi-copa-del-mundo.jpeg" width="200">
<h2>Esta es la encuesta más argentina que vas a ver.</h2>
<p>Vamos a explorar tus percepciones sobre nosotros, los argentinos.</p>
<p>Obvio no hay respuestas correctas, ni incorrectas.</p>
<p>Respondé como te salga. Toda información es guardada anónimamente. </p>
</div>
`,
choices:["Comenzar"]
});

// NOTA
timeline.push({
type: jsPsychHtmlButtonResponse,
stimulus: `
<div style="text-align:center">
<h1> Eso sí, ¡cuidado! No vas a poder volver para atrás </h1>
</div>
`,
choices:["Continuar"]
});


// IDENTIDAD
timeline.push({
type: jsPsychSurveyLikert,
data:{tipo:"identidad_argentina"},
questions:[{
prompt:"<b>¿Qué tan argentino te sentís?</b>",
labels:["Nada","Poco","Algo","Bastante","Mucho"],
required:true
}],

on_load: function(){

// Selecciona todas las opciones del Likert
let radios = document.querySelectorAll('input[type="radio"]');

// A cada opción le agrega el auto-submit
radios.forEach(radio => {
radio.addEventListener("change", () => {

// pequeño delay para mejor UX
setTimeout(() => {
document.querySelector("#jspsych-survey-likert-next").click();
}, 150);

});
});

}

});

// INTRO ESTEREOTIPOS
timeline.push({
type: jsPsychHtmlButtonResponse,
stimulus: `
<p>Ahora vas a ver algunas características asociadas con los argentinos.</p>
<p><b>¿Qué tan verdaderas considerás las siguientes frases?</b></p>
`,
choices:["Continuar"]
});

// BLOQUE LIKERT
palabras.forEach(p=>{
timeline.push({

type: jsPsychSurveyLikert,

data:{estereotipo:p,tipo:"estereotipo"},

questions:[{
prompt:"<b>El argentino "+p+"</b>",
labels:["Nada","Poco","Algo","Bastante","Mucho"],
required:true
}],

on_load: function(){

// Selecciona todas las opciones del Likert
let radios = document.querySelectorAll('input[type="radio"]');

// A cada opción le agrega el auto-submit
radios.forEach(radio => {
radio.addEventListener("change", () => {

// pequeño delay para mejor UX
setTimeout(() => {
document.querySelector("#jspsych-survey-likert-next").click();
}, 150);

});
});

}

});
});

// TRANSICIÓN IDENTIDAD CULTURAL

timeline.push({

type: jsPsychHtmlButtonResponse,

stimulus:`
<p>A menudo, estas características son asociadas a nuestra historia.</p>
<p>Actualmente, existe un extenso debate en redes sobre dónde comienza esta historia.</p>
<p>Por lo general se mencionan dos orígenes: Europa y Latinoamérica.</p>
`,

choices:["Continuar"]

});

// IDENTIDAD CULTURAL
timeline.push({
type: jsPsychHtmlButtonResponse,
stimulus: `
<p><b>¿Con cuál de los siguientes grupos crees que la Argentina se asocia mejor?</b></p>
`,
choices:["Latinoamérica","Europa"],
data:{tipo:"identidad_cultural"}
});

// RESPUESTA ABIERTA
timeline.push({
type: jsPsychSurveyText,
questions:[{
prompt:"<b> ¿El argentino es algo más? (opcional) </b>",
rows:2,
columns:40
}],
on_finish: function(){
  document.activeElement.blur();
}
});

// TRANSICIÓN DEMO
timeline.push({
type: jsPsychHtmlButtonResponse,
stimulus:`<p> <b> Ya casi terminamos, ahora algunas preguntas sobre vos. </b> </p>`,
choices:["Continuar"]
});

// EDAD
timeline.push({
type: jsPsychSurveyText,
data:{tipo:"edad"},
questions:[{
prompt:"<b>Edad</b>",
required:true
}],
on_load: function(){

// seleccionar el input REAL que crea jsPsych
let input = document.querySelector('.jspsych-survey-text-question input');

// bloquear letras al tipear
input.addEventListener("keypress", function(e){
if(!/[0-9]/.test(e.key)){
e.preventDefault();
}
});

// limpiar si pegan texto raro
input.addEventListener("input", function(){
this.value = this.value.replace(/[^0-9]/g, '');
});

},
on_finish: function(){
  document.activeElement.blur();
}
});

// GÉNERO
timeline.push({
type: jsPsychSurveyMultiChoice,
data:{tipo:"genero"},
questions:[{
prompt:"<b>Género (opcional)</b>",
options:["Masculino","Femenino","No binario","Otro"]
}]
});

// PROVINCIA
timeline.push({
type: jsPsychSurveyMultiChoice,
data:{tipo:"provincia"},
questions:[{
prompt:"<b>¿Cuál es tu provincia de origen?</b>",
required: true,
options:["Buenos Aires","Ciudad Autónoma de Buenos Aires","Catamarca", "Chaco", "Chubut", "Córdoba","Corrientes", "Entre Ríos", "Formosa", "Jujuy", "La Pampa", "La Rioja", "Mendoza", "Misiones", "Neuquén", "Río Negro", "Salta", "San Juan", "San Luis", "Santa Cruz", "Santa Fé", "Santiago del Estero", "Tierra del Fuego, Antártida e Islas del Atlántico Sur", "Tucumán"]
}]
});

// CLUB DE FUTBOL 
timeline.push({
type: jsPsychSurveyText,
data:{tipo:"club"},
questions:[{
prompt:"<b>¿De qué equipo sos hincha? (opcional)</b>",
input_type:"text",
}],
on_finish: function(){
  document.activeElement.blur();
}  
});

// NIVEL EDUCATIVO E IDEOLOGÍA POLÍTICA
timeline.push({
type: jsPsychSurveyMultiChoice,
data:{tipo:"perfil"},
questions:[
    {prompt:"<b>¿A qué clase social crees que perteneces? </b>",
    required: true,
    options:["Clase Baja","Clase Media-Baja", "Clase Media", "Clase Media-Alta", "Clase Alta"]},
    
    {prompt:"<b>Con cuál de estas posiciones políticas te sentís más representado (opcional) </b>",
    options:["Izquierda","Centro","Derecha"]}
]
});

// INMIGRACIÓN
timeline.push({
type: jsPsychSurveyMultiChoice,
data:{tipo:"inmigracion"},
questions:[{
prompt:"<b>¿Alguno de tus abuelos o bisabuelos fue inmigrante?</b>",
options:["Sí","No", "No sé / No respondo"],
required:true,
name:"inmigrante"
}]
});

// CONTINENTE
timeline.push({
timeline:[{
type: jsPsychSurveyMultiChoice,
data:{tipo:"continente"},
questions:[{
prompt:"<b>¿De qué continente provenía?</b>",
options:["África","América","Asia","Europa","Oceanía"],
required:true,
name:"continente"
}]
}],
conditional_function: function(){
let data = jsPsych.data.get().last(1).values()[0];
return data.response.inmigrante === "Sí";
}
});

// CIERRE
timeline.push({
type: jsPsychHtmlButtonResponse,

stimulus: `
<div style="text-align:center">
<h2>¡Muchas gracias por completar la encuesta!</h2>
<p> Aguarda un segundo más...</p>
</div>
`,

choices:[],

on_load: async function(){

let raw = jsPsych.data.get().values();

let limpio = {
timestamp: new Date()
};

raw.forEach(trial => {

//// IDENTIDAD ARGENTINA
if(trial.tipo === "identidad_argentina"){
limpio.identidad_arg = Object.values(trial.response)[0]+1;
}

//// ESTEREOTIPOS
if(trial.tipo === "estereotipo"){
let val = Object.values(trial.response)[0];
limpio["est_" + trial.estereotipo] = val+1;
}

//// IDENTIDAD CULTURAL
if(trial.tipo === "identidad_cultural"){
limpio.identidad_cultural = trial.response+1;
}

//// RESPUESTA ABIERTA
if(trial.trial_type === "survey-text" && trial.response.Q0 && trial.tipo === undefined){
limpio.abierta = trial.response.Q0;
}

//// EDAD
if(trial.tipo === "edad"){
limpio.edad = Number(trial.response.Q0);
}

//// GÉNERO
if(trial.tipo === "genero"){
limpio.genero = trial.response.Q0;
}

//// PROVINCIA
if(trial.tipo === "provincia"){
limpio.provincia = trial.response.Q0;
}

//// CLUB
if(trial.tipo === "club"){
limpio.club = trial.response.Q0;
}

//// CLASE SOCIAL + IDEOLOGÍA
if(trial.tipo === "perfil"){
limpio.clase_social = trial.response.Q0;
limpio.ideologia = trial.response.Q1;
}

//// INMIGRACIÓN
if(trial.tipo === "inmigracion"){
limpio.inmigracion = trial.response.inmigrante;
}

//// CONTINENTE
if(trial.tipo === "continente"){
limpio.continente = trial.response.continente;
}

});

/// GUARDADO DE RESPUESTAS Y MENSAJE FINAL

await guardarDatos(limpio);

localStorage.setItem("encuesta_completada","true");

document.querySelector(".jspsych-content").innerHTML = `
<div style="
text-align:center;
background:rgba(255,255,255,0.95);
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
">

<h2>¡Respuestas guardadas correctamente!</h2>
<p>Gracias por hacer el aguante con la encuesta ❤️</p>
<img src="https://media.lacapital.com.ar/p/bbc575bcf9af21c4340bcb51095b992b/adjuntos/203/imagenes/020/885/0020885506/642x0/smart/diegomessijpg.jpg" width="200">
</div>
`;
}

});

// INICIAR
jsPsych.run(timeline);

</script>

</html>


</html>
